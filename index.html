<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conciertos Conectados</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/report.css">
</head>
<body>

    <header class="main-header">
        <div class="logo" id="nav-logo">🎵 Conciertos Conectados</div>
        <nav>
            <button id="btn-nav-client" class="btn active">Eventos</button>
            <button id="btn-nav-admin" class="btn btn-secondary">Admin</button>
            <button id="btn-open-cart" class="btn btn-cart">🛒 Carrito (<span id="cart-count">0</span>)</button>
        </nav>
    </header>

   
    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <span class="featured-tag">★ EVENTO DESTACADO</span>
            <h1>SUPER CONCIERTO FERIA DE CÚCUTA 2026</h1>
            <p>El gran concierto de pago reunirá a Grupo Firme (con su gira La Última Peda) y a Silvestre Dangond (con El Baile de Todos)</p>
        </div>
    </section>

    <main id="app-container"></main>

    
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-cart">&times;</span>
            <h2>Tu Carrito de Entradas</h2>
            <div id="cart-items"></div>
            <div class="cart-total">Total: $<span id="cart-total-val">0</span></div>

            <form id="checkout-form" class="hidden">
                <h3>Datos de Facturación</h3>
                <input type="text" id="cust-doc" placeholder="Número de Identificación" required>
                <input type="text" id="cust-name" placeholder="Nombre Completo" required>
                <input type="text" id="cust-dir" placeholder="Dirección" required>
                <input type="tel" id="cust-tel" placeholder="Teléfono" required>
                <input type="email" id="cust-email" placeholder="Correo Electrónico" required>
                <button type="submit" class="btn btn-success">Finalizar Compra</button>
            </form>
            <button id="btn-go-to-checkout" class="btn">Proceder al Pago</button>
        </div>
    </div>
    


    <script src="js/data-seed.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script src="js/sales-report.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
